name: last_love_fe
description: "Last Love - 40+ 끝사랑 데이팅 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # HTTP / API
  dio: ^5.7.0
  retrofit: '>=4.4.1 <4.5.0'

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2

  # Media
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Location / permissions
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  collection: ^1.18.0

  # Swipe deck
  appinio_swiper: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # 9.1.7 was the last release compatible with retrofit 4.4 and the
  # current generator interface. 9.7.0+ requires Parser.DartMappable.
  retrofit_generator: '>=9.1.7 <9.5.0'

flutter:
  uses-material-design: true
