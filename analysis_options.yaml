include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # Generated files - skip lint warnings we can't fix at the source.
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    # Generated retrofit/freezed files trip these; not actionable in user code.
    unused_element_parameter: ignore

linter:
  rules:
    # Allowed - we use deprecated Radio APIs intentionally since RadioGroup
    # isn't available on Flutter 3.41 stable.
    # deprecated_member_use: false
